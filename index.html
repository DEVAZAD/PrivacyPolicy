<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deepanshu Azad - Games Privacy Policies</title>
  <style>
    :root {
      --bg-color: #f8fafc;
      --text-color: #334155;
      --heading-color: #0f172a;
      --btn-bg: #2563eb;
      --btn-hover: #1d4ed8;
      --container-bg: #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: var(--text-color);
      background-color: var(--bg-color);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 600px;
      margin: 20px;
      padding: 40px;
      background-color: var(--container-bg);
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    h1 {
      color: var(--heading-color);
      font-size: 2rem;
      margin-top: 0;
      margin-bottom: 0.5em;
    }

    p {
      margin-bottom: 2em;
    }

    .game-links {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .btn {
      display: inline-block;
      padding: 15px 20px;
      background-color: var(--btn-bg);
      color: #ffffff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1.1rem;
      transition: background-color 0.2s ease;
    }

    .btn:hover {
      background-color: var(--btn-hover);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Privacy Policies</h1>
    <p>Please select a game to view its specific privacy policy.</p>
    
    <div class="game-links">
      <a href="chess-privacy.html" class="btn">Chess Privacy Policy</a>
      <a href="reflex-duel-privacy.html" class="btn">Reflex Duel Privacy Policy</a>
    </div>
  </div>
</body>
</html>
